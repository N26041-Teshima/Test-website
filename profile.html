<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* 背景画像の設定 */
            background-image: url('bg-image.jpg'); /* 画像のファイル名 */
            background-size: cover;                /* 画面全体にフィットさせる */
            background-position: center;           /* 画像の中心を中央に合わせる */
            background-attachment: fixed;         /* スクロールしても背景を固定する */
            background-repeat: no-repeat;          /* 画像を繰り返さない */
            
            /* 文字を読みやすくするためのフォント色調整（必要に応じて） */
            color: #333333; 
        }
        
        /* 背景が暗い・派手な場合に文字を読みやすくする白いボックス（お好みで） */
        .content-box {
            background-color: rgba(255, 255, 255, 0.85); /* 白背景（透明度85%） */
            border-radius: 10px;                         /* 角丸 */
            padding: 30px;                               /* 内側の余白 */
            display: inline-block;                       /* ボックスの幅をコンテンツに合わせる */
        }
    </style>
</head>
<body class="p-5">

    <div class="content-box">
        <h1>プロフィール</h1>
        <p>趣味はサーフィンと競馬です。</p>
        <a href="index.html" class="btn btn-secondary">戻る</a>
    </div>

</body>
</html>
