</head>
<body>

<div id="cookie-banner"
     class="position-fixed bottom-0 start-0 end-0 bg-light border-top shadow p-3"
     style="display: none; z-index: 1050;">
    <div class="container">
        <p class="mb-3">
            当サイトでは、サービス向上およびアクセス解析のためCookieを利用しています。<br>
            Google Analyticsを使用し、閲覧情報を収集しています。<br>
            詳細はプライバシーポリシーをご確認ください。
        </p>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="acceptCookies()">同意する</button>
            <button class="btn btn-outline-secondary" onclick="rejectCookies()">拒否する</button>
        </div>
    </div>
</div>

<script>
    // 💡 ご自身のGoogle Analytics（GA4）の測定IDに書き換えてください
    const GA_MEASUREMENT_ID = 'G-XXXXXXXXXX';

    // Google Analyticsを動的に読み込む関数
    function loadGoogleAnalytics() {
        if (window.gtag) return; // 既に読み込み済みの場合はスキップ

        // 1. gtags.js のスクリプトタグを生成
        const gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
        document.head.appendChild(gaScript);

        // 2. データレイヤーとgtag関数の初期化
        window.dataLayer = window.dataLayer || [];
        window.gtag = function(){ dataLayer.push(arguments); };
        
        // 3. 計測開始の実行
        gtag('js', new Date());
        gtag('config', GA_MEASUREMENT_ID);

        console.log('Google Analytics を動的に読み込みました');
    }

    // Cookie設定
    function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        document.cookie = `${name}=${value}; expires=${date.toUTCString()}; path=/`;
    }

    // Cookie取得
    function getCookie(name) {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            const c = cookie.trim();
            if (c.indexOf(name + '=') === 0) {
                return c.substring(name.length + 1);
            }
        }
        return null;
    }

    // 同意
    function acceptCookies() {
        setCookie('cookieConsent', 'accepted', 365);
        document.getElementById('cookie-banner').style.display = 'none';

        // 同意されたのでGoogle Analyticsを読み込む
        loadGoogleAnalytics();
        console.log('Cookie同意');
    }

    // 拒否
    function rejectCookies() {
        setCookie('cookieConsent', 'rejected', 365);
        document.getElementById('cookie-banner').style.display = 'none';

        console.log('Cookie拒否');
    }

    // ページ読み込み時の判定
    window.addEventListener('load', function () {
        const consent = getCookie('cookieConsent');
        if (!consent) {
            // 未回答の場合はバナーを表示（GAは読み込まない）
            document.getElementById('cookie-banner').style.display = 'block';
        } else if (consent === 'accepted') {
            // すでに同意済みの場合はバナーを隠したままGAを読み込む
            loadGoogleAnalytics();
        }
    });
</script>

<div class="container d-flex flex-column justify-content-center align-items-center" style="height: 80vh;">
    <p class="mb-3">これは試作段階のホームページです</p>
    
    <button class="btn btn-primary btn-lg" onclick="showWarning()">①</button>
    
    <div id="display-area" class="mt-4"></div>
</div>

<script>
    // 警告を表示する関数
    function showWarning() {
        const area = document.getElementById('display-area');
        area.innerHTML = `
            <div id="myAlert" class="alert alert-warning alert-dismissible fade show" role="alert">
                本当に押していいんですか？
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;

        // アラートが閉じられた瞬間のイベントを監視
        const alertElement = document.getElementById('myAlert');
        alertElement.addEventListener('closed.bs.alert', function () {
            area.innerHTML = `<h2 class="text-success">セーフ！</h2>`;
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
