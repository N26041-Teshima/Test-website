<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xx本部</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">xx本部</a>
            <div class="navbar-nav">
                <a class="nav-link" href="#" onclick="showMessage('こんにちは！')">ホーム</a>
                <a class="nav-link" href="#" onclick="showMessage('趣味はサーフィンと競馬です')">プロフィール</a>
            </div>
        </div>
    </nav>

    <div class="container d-flex flex-column justify-content-center align-items-center" style="height: 80vh;">
        <p class="mb-3">これは試作段階のホームページです</p>
        
        <button class="btn btn-primary btn-lg" onclick="showWarning()">①</button>
        
        <div id="display-area" class="mt-4"></div>
    </div>

    <script>
        function showMessage(text) {
            document.getElementById('display-area').innerHTML = `<h2 class="text-primary">${text}</h2>`;
        }

        function showWarning() {
            const area = document.getElementById('display-area');
            area.innerHTML = `
                <div id="myAlert" class="alert alert-warning alert-dismissible fade show" role="alert">
                    本当に押していいんですか？
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;

            // アラートが閉じられた瞬間のイベントを監視
            const alertElement = document.getElementById('myAlert');
            alertElement.addEventListener('closed.bs.alert', function () {
                area.innerHTML = `<h2 class="text-success">セーフ！</h2>`;
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
