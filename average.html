<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>平均計算 - xx本部</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="mb-3">
        <a href="index.html" class="btn btn-outline-secondary">← トップ画面に戻る</a>
    </div>

    <h2>平均計算</h2>
    <input type="number" id="n1" class="form-control mb-2" placeholder="数字1">
    <input type="number" id="n2" class="form-control mb-2" placeholder="数字2">
    <input type="number" id="n3" class="form-control mb-2" placeholder="数字3">
    <button class="btn btn-primary" onclick="calc()">平均計算</button>
    <div id="result" class="mt-3 fs-3"></div>

    <script>
        function calc() {
            const v1 = parseFloat(document.getElementById('n1').value) || 0;
            const v2 = parseFloat(document.getElementById('n2').value) || 0;
            const v3 = parseFloat(document.getElementById('n3').value) || 0;
            const avg = (v1 + v2 + v3) / 3;
            let msg = avg <= 50 ? "まだまだだね" : avg <= 80 ? "やるね" : avg <= 90 ? "すごい！" : "エクセレント！！";
            document.getElementById('result').innerText = `平均: ${avg.toFixed(1)} (${msg})`;
        }
    </script>
</body>
</html>
