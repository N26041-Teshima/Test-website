<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホーム - 入力フォーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

    <h1>ホームだよ！</h1>
    
    <div class="mt-4">
        <label for="userName" class="form-label">お名前を入力してください</label>
        <input type="text" class="form-control" id="userName" placeholder="山田 太郎">
    </div>

    <button type="button" class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#confirmModal">
        送信
    </button>

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">確認</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    本当に送信していいですか？
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-primary" onclick="submitForm()">送信する</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function submitForm() {
            const name = document.getElementById('userName').value;
            alert(name + " さん、送信ボタンが押されました！\n※現在はメール機能がないため通知のみです。");
            // ここに実際のメール送信処理や、フォーム送信処理を繋げます
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
